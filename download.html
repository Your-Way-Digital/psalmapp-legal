<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSALM — Download</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1C0E02;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
    }

    .card {
      text-align: center;
      padding: 48px 32px;
      max-width: 360px;
      width: 90%;
      border: 1.5px solid #C8960C;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .title {
      font-size: 13px;
      color: #C8960C;
      letter-spacing: 6px;
      font-weight: bold;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: #C8960C;
      opacity: 0.5;
    }

    .badge {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1.5px solid #C8960C;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .badge-label {
      font-size: 9px;
      color: #C8960C;
      letter-spacing: 1px;
    }

    .badge-icon {
      font-size: 28px;
    }

    .subtitle {
      font-size: 14px;
      color: #8A6030;
      letter-spacing: 2px;
    }

    .verse {
      font-size: 15px;
      color: #F2E8D5;
      line-height: 1.7;
      font-style: italic;
      padding: 0 8px;
    }

    .divider-thin {
      width: 48px;
      height: 1px;
      background: #C8960C;
      opacity: 0.3;
    }

    .redirect-msg {
      font-size: 12px;
      color: #8A6030;
      letter-spacing: 1px;
    }

    .btn {
      display: inline-block;
      background: #C8960C;
      color: #1C0E02;
      padding: 14px 32px;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      transition: opacity 0.2s;
      width: 100%;
      text-align: center;
    }

    .btn:hover { opacity: 0.85; }

    .btn-ghost {
      display: inline-block;
      color: #C8960C;
      padding: 10px 32px;
      border-radius: 30px;
      font-size: 12px;
      text-decoration: none;
      border: 1px solid rgba(200,150,12,0.4);
      width: 100%;
      text-align: center;
      letter-spacing: 1px;
    }

    .progress {
      width: 100%;
      height: 2px;
      background: rgba(200,150,12,0.2);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #C8960C;
      width: 0%;
      transition: width 1.5s linear;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">P S A L M</div>
    <div class="divider"></div>

    <div class="badge">
      <span class="badge-label">SALMO</span>
      <span class="badge-icon">✦</span>
    </div>

    <div class="subtitle">DESCOBRE O TEU SALMO DIÁRIO</div>
    <div class="divider-thin"></div>

    <p class="verse">"A sabedoria começa pelo temor do Senhor."</p>
    <div class="divider-thin"></div>

    <p class="redirect-msg">A redirecionar para a loja...</p>

    <div class="progress">
      <div class="progress-bar" id="bar"></div>
    </div>

    <a id="btn-store" class="btn" href="#">⬇ Download</a>
    <a id="btn-other" class="btn-ghost" href="#">Ver outra loja</a>
  </div>

  <script>
    var IOS_URL     = 'https://apps.apple.com/app/idXXXXXXXXX'; // ← substitui pelo teu ID App Store
    var ANDROID_URL = 'https://play.google.com/store/apps/details?id=com.yourwaydigital.psalm';

    var ua = navigator.userAgent;
    var isIOS = /iPhone|iPad|iPod/i.test(ua);

    var primaryUrl   = isIOS ? IOS_URL     : ANDROID_URL;
    var secondaryUrl = isIOS ? ANDROID_URL : IOS_URL;
    var primaryLabel   = isIOS ? '⬇ Download na App Store'   : '⬇ Download no Google Play';
    var secondaryLabel = isIOS ? 'Ver no Google Play' : 'Ver na App Store';

    document.getElementById('btn-store').href        = primaryUrl;
    document.getElementById('btn-store').textContent = primaryLabel;
    document.getElementById('btn-other').href        = secondaryUrl;
    document.getElementById('btn-other').textContent = secondaryLabel;

    // barra de progresso + redirect automático
    setTimeout(function() {
      document.getElementById('bar').style.width = '100%';
    }, 50);

    setTimeout(function() {
      window.location.href = primaryUrl;
    }, 1600);
  </script>
</body>
</html>
